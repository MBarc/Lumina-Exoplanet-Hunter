version: "3.9"

# ── Lumina local development stack ─────────────────────────────────────────────
#
# Starts two containers (api + scheduler). MongoDB is hosted on Atlas —
# set MONGODB_URI in your .env file (see .env.example).
#
# Usage:
#   docker compose up --build       # first run (builds all images)
#   docker compose up               # subsequent runs
#   docker compose down             # stop and remove containers
#
# The API is available at http://localhost:8000
# Interactive docs at    http://localhost:8000/docs

services:

  # ── FastAPI ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # All values come from .env — no secrets hardcoded here.
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB:  ${MONGODB_DB:-lumina}
      API_KEY:     ${API_KEY}
    ports:
      - "8001:8000"
    # Mount the source code so uvicorn --reload picks up changes without rebuild.
    # Remove this volume mount for production builds.
    volumes:
      - .:/app
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/api

  # ── Scheduler ─────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    restart: unless-stopped
    depends_on:
      - api           # scheduler's wait_for_api() loop handles readiness
    environment:
      API_URL: http://api:8000
      API_KEY: ${API_KEY}
      # Tune these to taste in your .env file:
      # MAST_SYNC_BATCH_SIZE: 500
      # QUEUE_LOW_WATER_MARK: 100
      # MAX_JOBS_PER_NODE: 5
      # JOB_TIMEOUT_SECONDS: 3600
    volumes:
      - .:/app
